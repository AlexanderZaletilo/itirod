<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <header style="font-size: 50px">
        <div id="header-logo">
            <span id="tg-logo">&#8801;</span>
            <span id="tg-caption">Telegram</span>
        </div>
        <div id="header-main">
            <div id="header-channel">
                <strong class="channel-name"></strong>
                <span class="channel-users-count"></span>
            </div>
            <div id="header-search">
                <span class="header-icon">&#x2315;</span>
            </div>
            <div id="header-options">
                <span class="header-icon">&#x22EE;</span>
            </div>
        </div>
    </header>
    <aside>
        <header>
            <div id="aside-search">
                <label id="aside-search-icon" for="aside-search">&#x2315;</label>
                <input id="aside-search" type="text" placeholder="Search">
            </div>
        </header>
        <ul id="channel-list">
            <li class="channel-list-item">
                <img>
                <div class="list-item-text">
                    <span class="list-item-name"></span>
                    <span class="list-item-last-message"></span>
                </div>
                <div class="list-item-additional">
                    <span class="list-item-posted"></span>
                    <span class="list-item-unread"></span>
                </div>
            </li>
        </ul>
    </aside>
    <main>
        <header id="messages-header">

        </header>
        <main id="messages-main">
            <ul id="messages-list">
                <li>
                    <img class="msg-sender-icon">
                    <div class="msg-content">
                        <span class="msg-sender-name"></span>
                        <div class="msg-body"></div>
                    </div>
                    <div class="msg-time"></div>
                </li>
            </ul>
        </main>
        <footer id="messages-footer">

        </footer>
    </main>
</body>
</html>
